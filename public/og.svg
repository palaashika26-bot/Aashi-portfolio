<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#09090B"/>
      <stop offset="1" stop-color="#0E0E12"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#E7ECFF"/>
      <stop offset="0.5" stop-color="#7AA2FF"/>
      <stop offset="1" stop-color="#B58BFF"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <g transform="translate(80, 90)">
    <rect width="56" height="56" rx="12" fill="url(#logo)"/>
    <text x="20" y="40" font-family="Space Grotesk, sans-serif" font-size="30" font-weight="600" fill="white">A</text>
    <text x="80" y="40" font-family="Inter, sans-serif" font-size="24" fill="rgba(255,255,255,0.85)">Aashika Pal</text>
  </g>
  <g transform="translate(80, 250)">
    <text font-family="Space Grotesk, sans-serif" font-size="78" font-weight="600" fill="white" letter-spacing="-2">
      <tspan x="0" dy="0">Building scalable web applications</tspan>
      <tspan x="0" dy="90" fill="url(#brand)">with modern technologies.</tspan>
    </text>
  </g>
  <g transform="translate(80, 500)" font-family="Inter, sans-serif">
    <text font-size="22" fill="rgba(255,255,255,0.55)">Full Stack Web Developer &#183; Mumbai</text>
    <text x="0" y="40" font-family="JetBrains Mono, monospace" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="4">
      AASHIKAPAL.DEV
    </text>
  </g>
</svg>
